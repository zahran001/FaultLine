# OpenTelemetry Collector — receives OTLP metrics PUSHED by the FaultLine backend and
# re-exposes them on a Prometheus scrape endpoint (:8889) that the prometheus service
# scrapes. Endpoints bind 0.0.0.0 so they are reachable across the container boundary
# (the default localhost bind would only accept connections from inside the container).

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch: {}

exporters:
  # Re-expose received metrics for Prometheus to scrape at otel-collector:8889/metrics.
  prometheus:
    endpoint: 0.0.0.0:8889
    # Turn the OTLP resource attributes (service.name = faultline-backend) into labels,
    # so series are attributable to the backend in PromQL/Grafana.
    resource_to_telemetry_conversion:
      enabled: true
  # Console echo of every batch — invaluable when verifying the pipeline at checkpoint 2.
  debug:
    verbosity: normal

service:
  telemetry:
    logs:
      level: info
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, debug]
