# Grafana dashboard provisioning — load JSON dashboards from a directory SEPARATE from
# this provider file (Grafana would otherwise try to parse provider.yml as a dashboard).
apiVersion: 1

providers:
  - name: FaultLine
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    editable: true
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
