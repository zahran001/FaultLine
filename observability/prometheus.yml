# Prometheus — scrapes the OpenTelemetry Collector's Prometheus exporter and serves
# PromQL to Grafana. Short interval for a responsive live demo.

global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]   # the collector's prometheus exporter endpoint
